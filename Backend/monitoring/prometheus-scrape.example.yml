# Example Prometheus config to scrape the NanakFinserv API and load its alerts.
# Merge the relevant parts into your real prometheus.yml.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/prometheus-rules.yml

# Alertmanager (point at your deployment).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: nanakfinserv-api
    metrics_path: /metrics
    # If METRICS_TOKEN is set on the API, pass it here:
    # params:
    #   token: ["<METRICS_TOKEN>"]
    static_configs:
      - targets: ["api.nanakfinserv.com:443"]
    scheme: https
