# Example Alertmanager config — routes the alerts from prometheus-rules.yml to
# Slack and PagerDuty by severity. Replace the placeholder URLs/keys with yours
# (ideally via env/secret injection, not committed).
global:
  resolve_timeout: 5m
  slack_api_url: "https://hooks.slack.com/services/REPLACE/WITH/WEBHOOK"

route:
  receiver: slack-warning
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: ['severity="critical"']
      receiver: pagerduty-critical
      continue: true
    - matchers: ['severity="critical"']
      receiver: slack-critical

receivers:
  - name: slack-warning
    slack_configs:
      - channel: "#alerts-nanakfinserv"
        send_resolved: true
        title: '{{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ "\n" }}{{ end }}'

  - name: slack-critical
    slack_configs:
      - channel: "#incidents"
        send_resolved: true
        title: '🔴 {{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ "\n" }}{{ end }}'

  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: "REPLACE_WITH_PAGERDUTY_ROUTING_KEY"
        description: '{{ .CommonLabels.alertname }}: {{ .CommonAnnotations.summary }}'
        severity: critical
